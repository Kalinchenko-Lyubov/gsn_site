<html lang="ru">
<head>
    <meta charset="UTF-8">

    <style>

        body {
            font-family: "Montserrat", sans-serif;
            color: #222;
            letter-spacing: 0.01em;
            line-height: 1.7;

            background-image: url("/media/backgrounds/bg.jpeg");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            }

        .hero {
            background-image:
                linear-gradient(
                    rgba(10, 61, 145, 0.75),
                    rgba(10, 61, 145, 0.75)
                ),
                url("/media/backgrounds/hero-bg.jpg");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
            padding: 120px 0;
        }

        .hero-logo {
            width: 100%;
            max-width: auto;
            height: auto;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }

        .hero-title {
            font-size: 56px;
            font-weight: 700;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .hero-subtitle {
            font-size: 24px;
            margin-top: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .hero-text {
            font-size: 30px;
            margin-top: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
         }

        .hero-phone {
            font-size: 28px;
            font-weight: bold;
            margin-top: 25px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .section-title {
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .card {
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,.9);
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .project-card {
            overflow: hidden;
            border-radius: 15px;
        }

        .project-card img:hover {
            transform: scale(1.08);
        }

        .project-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
        }

        .gallery-section {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
        }

        .card-img-top {
            height: 320px;
            object-fit: cover;
            transition: 0.5s;
        }

        .btn-warning {
            background-color: #ff7a00;
            border-color: #ff7a00;
        }

        .btn-warning:hover {
             background-color: #e86f00;
             border-color: #e86f00;
         }

        .advantage-box {
            text-align: center;
            padding: 20px;
        }

        .advantage-box h3 {
            color: #d4a017;
            font-size: 36px;
        }

        footer {
            background: #0a3d91;
            color: white;
            padding: 50px 0;
        }

        footer a {
            color: white;
            text-decoration: none;
        }

        .document-card {
            overflow: hidden;
        }

        .document-card img {
            height: 350px;
            object-fit: cover;
            transition: 0.4s;
        }

        .document-card:hover img {
            transform: scale(1.05);
        }

        .document-card .btn {
            width: 100%;
        }

        .gallery-image {
            cursor: pointer;
        }

        .image-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background: rgba(0,0,0,0.95);
        }

        .modal-content {
            display: block;
            margin: auto;
            width: auto;
            height: auto;
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #ff7a00;
        }


        .step-number {
            width: 70px;
            height: 70px;
            line-height: 70px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: #0d6efd;
            color: white;
            font-weight: bold;
            font-size: 32px;
        }

        .messenger-buttons {
            position: fixed;
            right: 25px;
            bottom: 25px;

            z-index: 9999;

            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messenger-buttons a {
            width: 60px;
            height: 60px;

            background: white;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            box-shadow: 0 6px 20px rgba(0,0,0,0.25);

            transition: 0.3s;
        }

        .messenger-buttons a:hover {
            transform: scale(1.12);
        }

        .messenger-buttons img {
            width: 46px;
            height: 46px;
            object-fit: contain;
        }

        :root {
            --gsn-blue: #0a3d91;
            --gsn-light: #f4f8ff;
            --gsn-accent: #ff7a00;
        }

        .section-light {
            background: rgba(244,248,255,0.95);
        }

        .about-box {
            background: rgba(255,255,255,0.92);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,.15);
        }

        .glass-section {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            margin: 50px auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .adv-icon{
            width:70px;
            height:70px;
            margin-bottom:20px;
            opacity:0.9;
        }

        .advantage-box{
            background:rgba(255,255,255,0.85);
            border-radius:20px;
            padding:30px;
            height:100%;
            box-shadow:0 10px 30px rgba(0,0,0,.12);
        }

        .feature-card{
            background: rgba(255,255,255,0.92);
            border-radius: 25px;

            padding: 30px;

            display: flex;
            align-items: center;
            gap: 25px;

            min-height: 160px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.12);

            transition: 0.3s;
        }

        .feature-card:hover{
            transform: translateY(-5px);
        }

        .feature-icon{
            width: 90px;
            height: 90px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .feature-card h4{
            font-weight: 700;
            margin-bottom: 10px;
        }

        .feature-card p{
            margin-bottom: 0;
            color: #555;
        }

        .work-timeline-section {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(6px);
        }

        .timeline {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        .timeline::before {
            content: "";
            position: absolute;

            left: 40px;
            top: 0;
            bottom: 0;

            width: 3px;

            background: linear-gradient(
                to bottom,
                #0a3d91,
                #4a90e2
            );
        }

        .timeline-item {
            display: flex;
            align-items: flex-start;

            margin-bottom: 50px;

            position: relative;
        }

        .timeline-number {
            min-width: 80px;
            height: 80px;

            border-radius: 50%;

            background: white;

            box-shadow:
                0 10px 25px rgba(0,0,0,0.12);

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 26px;
            font-weight: bold;

            color: #0a3d91;

            z-index: 2;
        }

        .timeline-content {
            margin-left: 30px;

            background: rgba(255,255,255,0.95);

            padding: 25px 30px;

            border-radius: 18px;

            box-shadow:
                0 10px 25px rgba(0,0,0,0.08);

            flex: 1;
        }

        .timeline-content h3 {
            font-size: 30px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .timeline-content p {
            margin: 0;
            font-size: 20px;
            color: #555;
        }

        @media (max-width: 768px) {

            .timeline::before {
                left: 25px;
            }

            .timeline-number {
                min-width: 50px;
                height: 50px;
                font-size: 18px;
            }

            .timeline-content {
                margin-left: 20px;
            }

            .timeline-content h3 {
                font-size: 22px;
            }

            .timeline-content p {
                font-size: 16px;
            }
        }

        .project-card .carousel-item img {
                height: 320px;
                object-fit: cover;
            }

            .carousel-control-prev,
            .carousel-control-next {
                width: 15%;
            }

            .carousel-control-prev-icon,
            .carousel-control-next-icon {
                background-color: rgba(0,0,0,0.5);
                border-radius: 50%;
                padding: 18px;
            }

        .gallery-prev,
            .gallery-next {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                color: white;
                font-size: 60px;
                cursor: pointer;
                user-select: none;
                padding: 20px;
                z-index: 10000;
            }

            .gallery-prev {
                left: 30px;
            }

            .gallery-next {
                right: 30px;
            }

            .gallery-prev:hover,
            .gallery-next:hover {
                color: #ff7a00;
            }

        .about-intro h3{
            font-size: 52px;
            margin-bottom: 25px;
        }

        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
            margin-bottom:50px;
        }

        .stat-card{
            background:linear-gradient(135deg,#18345f,#2455a5);
            color:white;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 15px 30px rgba(0,0,0,.15);
        }

        .stat-card span{
            font-size:54px;
            font-weight:bold;
            display:block;
        }

        .about-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:25px;
        }

        .about-card{
            background:rgba(255,255,255,.92);
            backdrop-filter:blur(8px);
            border-radius:25px;
            padding:30px;
            box-shadow:0 10px 25px rgba(0,0,0,.12);
            transition:.3s;
        }

        .about-card:hover{
            transform:translateY(-8px);
        }

        .about-icon{
            font-size:42px;
            margin-bottom:15px;
        }

        .about-card h4{
            margin-bottom:20px;
            color:#18345f;
        }

        .about-card ul{
            padding-left:18px;
        }

        .about-card li{
            margin-bottom:10px;
        }

        .equipment-block{
            margin-top:50px;
            padding:35px;
            border-radius:25px;
            background:linear-gradient(135deg,#18345f,#2455a5);
            color:white;
        }

        .about-footer{
            margin-top:40px;
            text-align:center;
            font-size:20px;
            font-weight:500;
        }

    </style>

</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<div id="imageModal" class="image-modal">

    <span class="close-modal" onclick="closeImage()">
        &times;
    </span>

    <img id="modalImage" class="modal-content">

</div>

<script>

function openImage(src) {

    document.getElementById("imageModal").style.display = "block";
    document.getElementById("modalImage").src = src;

}

function closeImage() {

    document.getElementById("imageModal").style.display = "none";

}

document.getElementById("imageModal").onclick = function(e) {

    if (e.target.id === "imageModal") {
        closeImage();
    }

};

</script>

<script>

const galleries = {
{% for project in projects %}
    {{ project.id }}: [
        {% for image in project.images.all %}
            "{{ image.image.url }}",
        {% endfor %}
    ],
{% endfor %}
};

let currentProject = null;
let currentImage = 0;

function openGallery(projectId, imageIndex) {

    currentProject = projectId;
    currentImage = imageIndex;

    document.getElementById("imageModal").style.display = "block";

    showImage();
}

function showImage() {

    document.getElementById("modalImage").src =
        galleries[currentProject][currentImage];

}

function nextImage() {

    currentImage++;

    if (currentImage >= galleries[currentProject].length) {
        currentImage = 0;
    }

    showImage();
}

function prevImage() {

    currentImage--;

    if (currentImage < 0) {
        currentImage =
            galleries[currentProject].length - 1;
    }

    showImage();
}

function closeImage() {

    document.getElementById("imageModal").style.display = "none";

}

</script>
