<!DOCTYPE html>
<html lang="ru">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ООО «ГазСтройНовации»</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ООО «ГСН»</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#about">О компании</a></li>
                <li class="nav-item"><a class="nav-link" href="#services">Услуги</a></li>
                <li class="nav-item"><a class="nav-link" href="#projects">Объекты</a></li>
                <li class="nav-item"><a class="nav-link" href="#documents">Документы</a></li>
                <li class="nav-item"><a class="nav-link" href="#contacts">Контакты</a></li>
            </ul>
        </div>
    </div>
</nav>

{% block content %}
{% endblock %}

<div class="messenger-buttons">
    <a href="https://wa.me/79184570095" target="_blank" title="WhatsApp">
        <img src="/media/icons/whatsapp.svg" alt="WhatsApp">
    </a>
    <a href="https://t.me/79184570095" target="_blank" title="Telegram">
        <img src="/media/icons/telegram.svg" alt="Telegram">
    </a>
    <a href="https://max.ru/79184570095" target="_blank" title="MAX">
        <img src="/media/icons/max.svg" alt="MAX">
    </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div id="imageModal" class="image-modal">
    <span class="close-modal" onclick="closeImage()">
        &times;
    </span>
    <span class="gallery-prev" onclick="prevImage()">❮</span>
    <img id="modalImage" class="modal-content">
    <span class="gallery-next" onclick="nextImage()">❯</span>
</div>
</body>
</html>
