<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ООО «ГазСтройНовации»</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body {
            font-family: 'Times New Roman', Times, serif !important;
            color: #222;
            letter-spacing: 0.01em;
            line-height: 1.7;

            background-image: url("/media/backgrounds/bg.jpeg");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            }

        .hero {
            background-image:
                linear-gradient(
                    rgba(10, 61, 145, 0.75),
                    rgba(10, 61, 145, 0.75)
                ),
                url("/media/backgrounds/hero-bg.jpg");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
            padding: 120px 0;
        }

        .hero-logo {
            width: 100%;
            max-width: auto;
            height: auto;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }

        .hero-title {
            font-size: 56px;
            font-weight: 700;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .hero-subtitle {
            font-size: 24px;
            margin-top: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .hero-text {
            font-size: 30px;
            margin-top: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
         }

        .hero-phone {
            font-size: 28px;
            font-weight: bold;
            margin-top: 25px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .section-title {
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .card {
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,.9);
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .project-card {
            overflow: hidden;
            border-radius: 15px;
        }

        .project-card img:hover {
            transform: scale(1.08);
        }

        .project-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
        }

        .gallery-section {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
        }

        .card-img-top {
            height: 320px;
            object-fit: cover;
            transition: 0.5s;
        }

        .btn-warning {
            background-color: #ff7a00;
            border-color: #ff7a00;
        }

        .btn-warning:hover {
             background-color: #e86f00;
             border-color: #e86f00;
         }

        .advantage-box {
            text-align: center;
            padding: 20px;
        }

        .advantage-box h3 {
            color: #0d6efd;
            font-size: 36px;
        }

        footer {
            background: #0a3d91;
            color: white;
            padding: 50px 0;
        }

        footer a {
            color: white;
            text-decoration: none;
        }

            .document-card {
            overflow: hidden;
        }

        .document-card img {
            height: 350px;
            object-fit: cover;
            transition: 0.4s;
        }

        .document-card:hover img {
            transform: scale(1.05);
        }

        .document-card .btn {
            width: 100%;
        }

        .gallery-image {
            cursor: pointer;
        }

        .image-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background: rgba(0,0,0,0.95);
        }

        .modal-content {
            display: block;
            margin: auto;
            width: auto;
            height: auto;
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #ff7a00;
        }


        .step-number {
            width: 70px;
            height: 70px;
            line-height: 70px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: #0d6efd;
            color: white;
            font-weight: bold;
            font-size: 32px;
        }

        .messenger-buttons {
            position: fixed;
            right: 25px;
            bottom: 25px;

            z-index: 9999;

            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messenger-buttons a {
            width: 60px;
            height: 60px;

            background: white;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            box-shadow: 0 6px 20px rgba(0,0,0,0.25);

            transition: 0.3s;
        }

        .messenger-buttons a:hover {
            transform: scale(1.12);
        }

        .messenger-buttons img {
            width: 46px;
            height: 46px;
            object-fit: contain;
        }

        :root {
            --gsn-blue: #0a3d91;
            --gsn-light: #f4f8ff;
            --gsn-accent: #ff7a00;
        }

        .section-light {
            background: rgba(244,248,255,0.95);
        }

        .about-box {
            background: rgba(255,255,255,0.92);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,.15);
        }

        .glass-section {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            margin: 50px auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .adv-icon{
            width:70px;
            height:70px;
            margin-bottom:20px;
            opacity:0.9;
        }

        .advantage-box{
            background:rgba(255,255,255,0.85);
            border-radius:20px;
            padding:30px;
            height:100%;
            box-shadow:0 10px 30px rgba(0,0,0,.12);
        }

        .feature-card{
            background: rgba(255,255,255,0.92);
            border-radius: 25px;

            padding: 30px;

            display: flex;
            align-items: center;
            gap: 25px;

            min-height: 160px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.12);

            transition: 0.3s;
        }

        .feature-card:hover{
            transform: translateY(-5px);
        }

        .feature-icon{
            width: 90px;
            height: 90px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .feature-card h4{
            font-weight: 700;
            margin-bottom: 10px;
        }

        .feature-card p{
            margin-bottom: 0;
            color: #555;
        }

    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            ООО «ГСН»
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="#about">
                        О компании
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#services">
                        Услуги
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#projects">
                        Объекты
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#documents">
                        Документы
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#contacts">
                        Контакты
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

{% block content %}
{% endblock %}

<div class="messenger-buttons">

    <a href="https://wa.me/79184570095"
       target="_blank"
       title="WhatsApp">

        <img src="/media/icons/whatsapp.svg"
             alt="WhatsApp">
    </a>

    <a href="https://t.me/79184570095"
       target="_blank"
       title="Telegram">

        <img src="/media/icons/telegram.svg"
             alt="Telegram">
    </a>

    <a href="https://max.ru/79184570095"
       target="_blank"
       title="MAX">

        <img src="/media/icons/max.svg"
             alt="MAX">
    </a>

</div>

</body>
</html>
